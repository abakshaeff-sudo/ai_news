name: daily-digest

on:
  schedule:
    # 06:00 UTC = 09:00 Moscow (UTC+3)
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          USE_TELEGRAM: 'true'
          TRANSLATE: 'true'
          TRANSLATE_PROVIDER: ${{ secrets.TRANSLATE_PROVIDER }}   # 'libre' or 'deepl'
          TRANSLATE_API_URL: ${{ secrets.TRANSLATE_API_URL }}     # optional for libre
          TRANSLATE_API_KEY: ${{ secrets.TRANSLATE_API_KEY }}     # optional
